<!DOCTYPE html>
<html>
<head>
    <title>Shop Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: white;
            padding: 15px 40px;
            border-bottom: 1px solid #e5e5e5;
            font-weight: bold;
            font-size: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            gap: 40px;
        }

        .login-box {
            width: 300px;
            background: white;
            padding: 25px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
        }

        .login-box h3 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #222;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

        #result {
            margin-top: 10px;
            font-weight: bold;
        }

        .products {
            flex: 1;
        }

        .products h3 {
            margin-top: 0;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .product-card {
            background: white;
            border: 1px solid #e5e5e5;
            padding: 15px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .product-card h4 {
            margin: 0 0 5px;
        }

        .price {
            color: #e53935;
            font-weight: bold;
        }

        @media(max-width: 900px){
            .container {
                flex-direction: column;
            }
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<header>
    MyShop
</header>

<div class="container">

    <div class="login-box">
        <h3>Login</h3>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username">
            <input type="text" id="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
        <p id="result"></p>
    </div>

    <div class="products">
        <h3>Sản phẩm nổi bật</h3>

        <div class="product-grid">
            <div class="product-card">
                <h4>iPhone 15</h4>
                <p class="price">25,000,000 VND</p>
            </div>

            <div class="product-card">
                <h4>Samsung S24</h4>
                <p class="price">22,000,000 VND</p>
            </div>

            <div class="product-card">
                <h4>Dell XPS 13</h4>
                <p class="price">35,000,000 VND</p>
            </div>

            <div class="product-card">
                <h4>MacBook Air M2</h4>
                <p class="price">28,000,000 VND</p>
            </div>

            <div class="product-card">
                <h4>iPad Pro</h4>
                <p class="price">20,000,000 VND</p>
            </div>

            <div class="product-card">
                <h4>AirPods Pro</h4>
                <p class="price">5,000,000 VND</p>
            </div>
        </div>
    </div>

</div>

<script>
document.getElementById("loginForm").onsubmit = async function(e) {
    e.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    try {
        password = JSON.parse(password);
    } catch (e) {}

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
    document.getElementById("result").innerText = "Login success";
    
    if (data.role === "admin") {
        window.location = "/admin.html";
    } else if (data.role === "user") {
        window.location = "/user.html";
    } else {
        document.getElementById("result").innerText = "Login success (no redirect)";
    }
} 	
else {
    document.getElementById("result").innerText = "Login failed";
}
};
</script>

</body>
</html>
