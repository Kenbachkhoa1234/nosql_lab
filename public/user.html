<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: white;
            padding: 15px 40px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            margin: 0;
        }

        .logout {
            text-decoration: none;
            color: white;
            background: #222;
            padding: 8px 14px;
            border-radius: 4px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            display: flex;
            gap: 30px;
        }

        .profile-box {
            width: 280px;
            background: white;
            padding: 20px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
        }

        .profile-box h3 {
            margin-top: 0;
        }

        .orders {
            flex: 1;
            background: white;
            padding: 20px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #fafafa;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .delivered {
            background: #d4edda;
            color: #155724;
        }

        .shipping {
            background: #fff3cd;
            color: #856404;
        }

        @media(max-width: 900px){
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>MyShop - User</h2>
    <a href="/" class="logout">Logout</a>
</header>

<div class="container">

    <div class="profile-box">
        <h3>Thông tin tài khoản</h3>
        <p><strong>Username:</strong> user</p>
        <p><strong>Email:</strong> user@example.com</p>
        <p><strong>Role:</strong> User</p>
    </div>

    <div class="orders">
        <h3>Đơn hàng của bạn</h3>

        <table>
            <tr>
                <th>Mã đơn</th>
                <th>Sản phẩm</th>
                <th>Giá</th>
                <th>Trạng thái</th>
            </tr>

            <tr>
                <td>#1001</td>
                <td>iPhone 15</td>
                <td>25,000,000 VND</td>
                <td><span class="status delivered">Đã giao</span></td>
            </tr>

            <tr>
                <td>#1002</td>
                <td>AirPods Pro</td>
                <td>5,000,000 VND</td>
                <td><span class="status shipping">Đang giao</span></td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
