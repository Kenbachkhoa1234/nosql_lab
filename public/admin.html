<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }
        .product-table th,
        .product-table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .product-table th {
            background-color: #2c3e50;
            color: white;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .edit {
            background: #3498db;
            color: white;
        }
        .delete {
            background: #e74c3c;
            color: white;
        }
        .logout {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 14px;
            background: #555;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Admin Dashboard</h1>
    <p>Quản lý sản phẩm</p>

    <table class="product-table">
        <tr>
            <th>ID</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Tồn kho</th>
            <th>Hành động</th>
        </tr>
        <tr>
            <td>1</td>
            <td>iPhone 15</td>
            <td>25,000,000 VND</td>
            <td>10</td>
            <td>
                <button class="btn edit">Edit</button>
                <button class="btn delete">Delete</button>
            </td>
        </tr>
        <tr>
            <td>2</td>
            <td>Samsung S24</td>
            <td>22,000,000 VND</td>
            <td>8</td>
            <td>
                <button class="btn edit">Edit</button>
                <button class="btn delete">Delete</button>
            </td>
        </tr>
        <tr>
            <td>3</td>
            <td>Laptop Dell XPS</td>
            <td>35,000,000 VND</td>
            <td>5</td>
            <td>
                <button class="btn edit">Edit</button>
                <button class="btn delete">Delete</button>
            </td>
        </tr>
    </table>

    <a href="/" class="logout">Logout</a>

</body>
</html>
